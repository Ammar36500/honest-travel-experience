{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Reviews</title>
    <link rel="stylesheet" href="{% static 'images/css/style.css' %}">
</head>
<body>
    <header>
        <nav class="nav">
            <a href="{% url 'destinations' %}" class="nav-item">Destinations</a>
            <a href="{% url 'submit_review' %}" class="nav-item">Write a Review</a>
            <a href="{% url 'about' %}" class="nav-item">About Us</a>
            <a href="{% url 'contact' %}" class="nav-item">Contact</a>
        </nav>

        <a href="{% url 'home' %}">
            <img src="{% static 'images/logo.png' %}" alt="Travel logo Reviews" class="logo">
        </a>

        {% if user.is_authenticated %}
        <div class="profile-menu">
            <p>Welcome, {{ user.username }}!</p>
            <a href="{% url 'profile' %}">
                <img src="{% static 'images/profile-icon.png' %}" alt="Profile" class="profile-icon">
            </a>
            <a href="{% url 'logout' %}" class="logout-btn">Logout</a>
        </div>
        {% else %}
        <button class="login-btn" onclick="openModal()">Login</button>
        {% endif %}
    </header>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2>Login</h2>
            <form id="loginForm">
                {% csrf_token %}
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <p>Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
        </div>
    </div>
</body>
<script src="{% static 'images/javascript/java.js' %}"></script>
<script src="{% static 'images/javascript/Profile.js' %}"></script>
</html>
